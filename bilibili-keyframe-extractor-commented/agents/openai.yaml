# Human-facing metadata used by the Codex skill UI.
# This file is intentionally small: it tells the product how to label the skill,
# while the real procedural instructions stay in SKILL.md and the bundled files.
interface:
  # Display name shown in the skill list or invocation chips.
  display_name: "Bilibili Keyframe Extractor Commented"

  # Short one-line description used for quick scanning.
  # Keep it concise enough for UI lists, but specific enough to be useful.
  short_description: "Readable Bilibili keyframe extraction guide"

  # Example prompt inserted by the UI when someone wants to invoke the skill.
  # It explicitly mentions the skill name, which is the expected format.
  default_prompt: "Use $bilibili-keyframe-extractor-commented to explain or adapt Bilibili timestamp screenshot extraction in this codebase."
